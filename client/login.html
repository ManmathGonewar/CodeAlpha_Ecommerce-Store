<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CodeAlpha Store</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body data-page="login">
    <header id="site-header"></header>

    <main class="page-shell">
      <section class="page-intro">
        <span class="eyebrow">User Login</span>
        <h2>Welcome back</h2>
        <p>Sign in to manage your cart, place orders, and view your purchase history.</p>
      </section>

      <section class="form-card" style="max-width: 520px; margin: 0 auto;">
        <div id="login-feedback"></div>
        <form id="login-form" class="form-grid">
          <label class="form-label full-width">
            Email Address
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label class="form-label full-width">
            Password
            <input type="password" name="password" placeholder="Enter your password" required />
          </label>
          <div class="full-width form-actions">
            <button class="btn btn--primary" type="submit">Login</button>
            <a class="btn btn--outline" href="./register.html">Create Account</a>
          </div>
        </form>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/login.js"></script>
  </body>
</html>
